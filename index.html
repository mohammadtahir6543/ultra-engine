<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Engine | Cloud Native</title>
    <style>
        body { 
            background: #000; color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; overflow: hidden; display: flex; align-items: center; 
            justify-content: center; height: 100vh; 
        }

        /* Intro Screen */
        #intro { 
            position: fixed; width: 100%; height: 100%; background: #000; 
            display: flex; align-items: center; justify-content: center; 
            z-index: 100; transition: 1.5s; 
        }
        .glow-text { 
            font-size: 80px; font-weight: bold; color: #00ff88; 
            letter-spacing: 20px; animation: pulse 2s infinite; 
        }

        /* Start Screen */
        #start-screen { 
            display: none; text-align: center; z-index: 50; cursor: pointer; 
        }
        .start-btn { 
            font-size: 22px; color: #00ff88; margin-top: 20px; 
            letter-spacing: 5px; animation: blink 1.5s infinite; 
        }

        /* Dashboard */
        #dashboard { 
            display: none; text-align: center; width: 90%; max-width: 900px; opacity: 0; transition: 1s; 
        }
        .box-container { display: flex; gap: 30px; justify-content: center; flex-wrap: wrap; margin-top: 40px; }
        .card { 
            background: #0a0a0a; border: 1px solid #222; padding: 30px; 
            border-radius: 20px; width: 280px; transition: 0.3s; 
        }
        .card:hover { border-color: #00ff88; transform: translateY(-10px); }
        .btn { 
            background: #00ff88; color: #000; padding: 12px; border: none; 
            border-radius: 8px; font-weight: bold; cursor: pointer; 
            width: 100%; margin-top: 15px; text-decoration: none; display: block; 
        }
        .btn-outline { background: transparent; border: 1px solid #00ff88; color: #00ff88; }

        @keyframes pulse { 
            from { opacity: 0.2; text-shadow: 0 0 10px #00ff88; } 
            to { opacity: 1; text-shadow: 0 0 50px #00ff88; } 
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        .eye-safe-layer { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; background: rgba(255, 150, 0, 0.03); z-index: 1000; 
        }
    </style>
</head>
<body>
    <div class="eye-safe-layer"></div>

    <div id="intro"><div class="glow-text">ULTRA</div></div>

    <div id="start-screen" onclick="showDashboard()">
        <h1 style="color:#00ff88; font-size: 60px; margin: 0;">ULTRA ENGINE</h1>
        <div class="start-btn">CLICK TO START</div>
    </div>

    <div id="dashboard">
        <h2 style="color:#fff;">WELCOME TO THE WORKSPACE</h2>
        <div class="box-container">
            <div class="card">
                <h3>Native Apps</h3>
                <button class="btn" onclick="alert('Downloading PC Version...')">Download for PC</button>
                <button class="btn" onclick="alert('Downloading Mobile APK...')">Download for Mobile</button>
            </div>
            <div class="card">
                <h3>Web Editor</h3>
                <button class="btn btn-outline" onclick="window.location.href='editor.html'">Run Online</button>
            </div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('start-screen').style.display = 'block';
            }, 1000);
        }, 3000);

        function showDashboard() {
            document.getElementById('start-screen').style.display = 'none';
            const dash = document.getElementById('dashboard');
            dash.style.display = 'block';
            setTimeout(() => { dash.style.opacity = '1'; }, 50);
        }
    </script>
</body>
</html>
