<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Engine | Cloud & Download</title>
    <style>
        :root { --ultra-dark: #050505; --eye-safe-green: #00ff88; --soft-text: #b0b0b0; }
        body { background: var(--ultra-dark); color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 0; }
        
        /* Eye-Comfort Filter */
        .eye-safe-overlay { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; background: rgba(255, 150, 0, 0.05); z-index: 9999; }
        
        .container { padding: 50px 20px; }
        .logo { font-size: 3rem; font-weight: bold; color: var(--eye-safe-green); text-shadow: 0 0 20px rgba(0,255,136,0.3); }
        
        .options-grid { display: flex; justify-content: center; gap: 20px; margin-top: 40px; flex-wrap: wrap; }
        .card { background: #111; border: 1px solid #333; padding: 30px; border-radius: 15px; width: 300px; transition: 0.3s; cursor: pointer; }
        .card:hover { border-color: var(--eye-safe-green); transform: translateY(-10px); }
        
        .btn { background: var(--eye-safe-green); color: black; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; text-decoration: none; display: inline-block; margin-top: 15px; }
        .btn-online { background: transparent; border: 1px solid var(--eye-safe-green); color: var(--eye-safe-green); }
        
        p { color: var(--soft-text); line-height: 1.6; }
    </style>
</head>
<body>
    <div class="eye-safe-overlay"></div> <div class="container">
        <div class="logo">🌀 ULTRA ENGINE</div>
        <p>Zero-Storage. Cloud-Native. 100% Free.</p>

        <div class="options-grid">
            <div class="card">
                <h3>Download App</h3>
                <p>PC aur Mobile ke liye standalone app. Fast performance aur offline access.</p>
                <a href="#" class="btn" onclick="alert('Downloading Ultra Engine Installer...')">Download for PC</a>
                <a href="#" class="btn" onclick="alert('Downloading APK for Mobile...')">Download for Android</a>
            </div>

            <div class="card">
                <h3>Online Editor</h3>
                <p>Bina kuch download kiye browser mein game banayein. Sara data Email Cloud par save hoga.</p>
                <button class="btn btn-online" onclick="startOnlineEditor()">Launch Online Editor</button>
            </div>
        </div>
    </div>

    <script>
        function startOnlineEditor() {
            // Ye function user ko seedha Editor page par le jayega
            document.body.innerHTML = `
                <div style="padding:20px;">
                    <h2>🌀 Ultra Online Editor (Beta)</h2>
                    <p>Connecting to Cloud Storage (Email Sync)...</p>
                    <div id="editor-mock" style="width:100%; height:500px; border:2px dashed #333; display:flex; align-items:center; justify-content:center; color:#555;">
                        [ Visual Scripting Area - Drop Nodes Here ]
                    </div>
                    <button class="btn" onclick="location.reload()">Go Back</button>
                </div>
            `;
        }
    </script>
</body>
</html>
