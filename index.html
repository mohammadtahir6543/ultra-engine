<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Engine | Cloud Native</title>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* Intro Screen */
        #intro { position: fixed; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 10; transition: 1s; }
        .glow { font-size: 70px; font-weight: bold; color: #00ff88; letter-spacing: 15px; animation: pulse 2s infinite; }

        /* Start Screen */
        #start-screen { display: none; text-align: center; z-index: 5; cursor: pointer; }
        .start-btn { font-size: 25px; color: #00ff88; animation: blink 1.5s infinite; margin-top: 20px; }

        /* Dashboard */
        #dashboard { display: none; text-align: center; width: 90%; max-width: 800px; }
        .box { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 30px; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 15px; width: 250px; }
        .btn { background: #00ff88; color: #000; padding: 10px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; text-decoration: none; display: block; }
        
        @keyframes pulse { from { opacity: 0.3; text-shadow: 0 0 10px #00ff88; } to { opacity: 1; text-shadow: 0 0 40px #00ff88; } }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro"><div class="glow">ULTRA</div></div>

    <div id="start-screen" onclick="openDash()">
        <h1 style="color:#00ff88; font-size: 50px;">ULTRA ENGINE</h1>
        <div class="start-btn">CLICK TO START</div>
    </div>

    <div id="dashboard">
        <h2 style="color:#00ff88;">WELCOME TO ULTRA DASHBOARD</h2>
        <p style="color:#888;">No Storage Used | Cloud Sync Active</p>
        <div class="box">
            <div class="card">
                <h3>Native App</h3>
                <button class="btn" onclick="alert('Downloading PC Installer...')">Download for PC</button>
                <button class="btn" onclick="alert('Downloading Android APK...')">Download for Mobile</button>
            </div>
            <div class="card">
                <h3>Cloud Workspace</h3>
                <button class="btn" style="background:none; border:1px solid #00ff88; color:#00ff88;" onclick="alert('Launching Online Editor...')">Run Online</button>
            </div>
        </div>
    </div>

    <script>
        // Intro sequence
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('start-screen').style.display = 'block';
            }, 1000);
        }, 3000);

        function openDash() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }
    </script>
</body>
</html>
