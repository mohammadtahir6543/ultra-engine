<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine | 100% Fixed</title>
    <style>
        body { background: #000; color: #00ff88; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Nav Bar */
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 10px; z-index: 1000; }
        
        /* Main Workspace */
        #workspace { display: flex; flex: 1; position: relative; }
        
        /* Canvas Jahan Nodes Ayenge */
        #canvas { 
            flex: 1; 
            background: radial-gradient(#222 1px, transparent 1px); 
            background-size: 30px 30px; 
            position: relative; 
            overflow: hidden; 
            z-index: 10; /* Nodes visible hone ke liye */
        }

        #side-panel { width: 250px; background: #0a0a0a; border-left: 2px solid #222; padding: 20px; z-index: 100; }

        /* Nodes Styling */
        .node { 
            width: 140px; 
            background: #1a1a1a; 
            border: 2px solid #00ff88; 
            position: absolute; 
            border-radius: 8px; 
            z-index: 500; /* Sabse upar */
            cursor: move;
        }
        .node-header { background: #00ff88; color: #000; padding: 5px; font-weight: bold; text-align: center; font-size: 11px; pointer-events: none; }

        /* Preview Window */
        #play-preview { position: fixed; bottom: 20px; right: 270px; width: 250px; height: 150px; background: #000; border: 2px solid #ffcc00; display: none; z-index: 1000; border-radius: 10px; }
        #player { width: 20px; height: 20px; background: #00ff88; position: absolute; bottom: 20px; left: 10px; box-shadow: 0 0 10px #00ff88; }

        .btn { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 8px; width: 90%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="nav">
        <strong>🌀 ULTRA ENGINE</strong>
        <button class="btn" onclick="spawnNode('Move')">+ Move Node</button>
        <button class="btn" style="background:#ffcc00; color:#000;" onclick="togglePlay()">▶ PLAY</button>
        <button class="btn" style="margin-left:auto; background:#00ff88; color:#000;" onclick="alert('Synced!')">Save</button>
    </div>

    <div id="workspace">
        <div id="canvas"></div>
        <div id="side-panel">
            <h3 style="margin:0;">Settings</h3>
            <p id="node-label" style="font-size:12px; color:#555;">Select node</p>
            <label>Speed:</label>
            <input type="number" id="val-input" value="10" oninput="updateVal()">
        </div>
    </div>

    <div id="play-preview">
        <div style="background:#ffcc00; color:#000; font-size:10px; padding:2px 5px; font-weight:bold;">LIVE PREVIEW</div>
        <div id="player"></div>
    </div>

    <script>
        let selectedNode = null;
        let isPlaying = false;
        let playerPos = 10;
        let loop = null;

        function spawnNode(type) {
            const canvas = document.getElementById('canvas');
            const n = document.createElement('div');
            n.className = 'node';
            n.style.left = '100px'; 
            n.style.top = '100px';
            n.dataset.speed = "10";
            
            n.innerHTML = `<div class="node-header">${type.toUpperCase()}</div><div style="height:40px;"></div>`;
            
            n.onclick = (e) => {
                selectedNode = n;
                document.getElementById('node-label').innerText = type + " Selected";
                document.getElementById('val-input').value = n.dataset.speed;
                document.querySelectorAll('.node').forEach(x => x.style.borderColor = '#00ff88');
                n.style.borderColor = '#fff';
            };

            canvas.appendChild(n); // Asli line jo screen par dikhayegi
            drag(n);
        }

        function updateVal() {
            if(selectedNode) selectedNode.dataset.speed = document.getElementById('val-input').value;
        }

        function togglePlay() {
            const preview = document.getElementById('play-preview');
            const player = document.getElementById('player');
            isPlaying = !isPlaying;
            preview.style.display = isPlaying ? 'block' : 'none';

            if(isPlaying) {
                loop = setInterval(() => {
                    const firstNode = document.querySelector('.node');
                    let s = firstNode ? parseInt(firstNode.dataset.speed) / 5 : 2;
                    playerPos += s;
                    if(playerPos > 220) playerPos = 0;
                    player.style.left = playerPos + "px";
                }, 30);
            } else {
                clearInterval(loop);
                playerPos = 10;
                player.style.left = "10px";
            }
        }

        function drag(el) {
            let p1=0, p2=0, p3=0, p4=0;
            el.onmousedown = (e) => {
                p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmouseup=null; document.onmousemove=null; };
                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                    p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px";
                    el.style.left = (el.offsetLeft - p1) + "px";
                };
            }
        }
    </script>
</body>
</html>
