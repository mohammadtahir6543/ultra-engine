<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine | Final Fix</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 10px; z-index: 1000; }
        #workspace { display: flex; flex: 1; position: relative; }
        #canvas { flex: 1; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; position: relative; overflow: hidden; z-index: 1; }
        #side-panel { width: 260px; background: #0a0a0a; border-left: 2px solid #222; padding: 20px; z-index: 100; }
        .node { width: 150px; background: #1a1a1a; border: 2px solid #00ff88; position: absolute; border-radius: 8px; z-index: 10; cursor: move; }
        .node-header { background: #00ff88; color: #000; padding: 6px; font-weight: bold; text-align: center; font-size: 13px; border-radius: 5px 5px 0 0; }
        .port { width: 12px; height: 12px; background: #00ff88; border-radius: 50%; position: absolute; border: 2px solid #000; }
        .port-in { left: -8px; top: 40px; }
        .port-out { right: -8px; top: 40px; }
        .btn { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        input { background: #111; border: 1px solid #333; color: #00ff88; padding: 10px; width: 90%; margin-top: 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="nav">
    <strong>🌀 ULTRA EDITOR</strong>
    <button class="btn" onclick="addNode('Start')">+ Start</button>
    <button class="btn" onclick="addNode('Move')">+ Move</button>
    <button class="btn" onclick="addNode('Jump')">+ Jump</button>
    <button class="btn" style="background:#00ff88; color:#000; margin-left:auto;" onclick="alert('Saving...')">Save Cloud</button>
</div>

<div id="workspace">
    <div id="canvas" id="canvas-area"></div>
    <div id="side-panel">
        <h3 style="margin:0;">Properties</h3>
        <p id="node-name" style="color:#666;">Select a node</p>
        <label>Value:</label>
        <input type="number" id="prop-val" value="0"
