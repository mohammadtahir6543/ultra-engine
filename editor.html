<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine | Free Asset Store</title>
    <style>
        body { background: #000; color: #00ff88; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Intro & Start Screens */
        #intro { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: 1s; }
        #start-screen { position: fixed; inset: 0; background: #050505; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; cursor: pointer; }
        .ultra-text { font-size: 80px; font-weight: bold; letter-spacing: 20px; animation: glow 2s infinite alternate; }
        
        /* Layout */
        #editor-ui { display: none; flex-direction: column; height: 100vh; }
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 10px; z-index: 1000; }
        #workspace { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* Panels */
        #canvas { flex: 1; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; position: relative; overflow: hidden; z-index: 10; }
        .panel { width: 230px; background: #0a0a0a; border-left: 2px solid #222; padding: 15px; z-index: 100; overflow-y: auto; }

        /* Asset Cards */
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .asset-card { background: #111; border: 1px solid #333; padding: 5px; border-radius: 5px; text-align: center; cursor: pointer; transition: 0.3s; }
        .asset-card:hover { border-color: #00ff88; background: #1a1a1a; }
        .asset-img { width: 100%; height: 60px; object-fit: contain; }

        /* Nodes & Preview */
        .node { width: 140px; background: #1a1a1a; border: 2px solid #00ff88; position: absolute; border-radius: 8px; z-index: 500; }
        .node-header { background: #00ff88; color: #000; padding: 5px; font-weight: bold; text-align: center; font-size: 11px; }
        #play-preview { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 400px; height: 200px; background: #000; border: 2px solid #ffcc00; display: none; z-index: 1000; border-radius: 10px; }
        #player { width: 40px; height: 40px; background: #00ff88; position: absolute; bottom: 20px; left: 10px; background-size: contain; background-repeat: no-repeat; }

        .btn { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 12px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        @keyframes glow { from { text-shadow: 0 0 10px #00ff88; opacity: 0.5; } to { text-shadow: 0 0 40px #00ff88; opacity: 1; } }
    </style>
</head>
<body>

    <div id="intro"><div class="ultra-text">ULTRA</div></div>

    <div id="start-screen" onclick="launchEditor()">
        <h1 style="color:#00ff88;">ULTRA ENGINE PRO</h1>
        <p style="color:#555;">CLICK TO START YOUR PROJECT</p>
    </div>

    <div id="editor-ui">
        <div id="nav">
            <strong>🌀 ULTRA</strong>
            <button class="btn" onclick="spawnNode('Move')">+ Move Node</button>
            <button class="btn" style="background:#ffcc00; color:#000;" onclick="togglePlay()">▶ PLAY GAME</button>
            <button class="btn" style="margin-left:auto;" onclick="alert('Cloud Sync Active')">☁️ Save</button>
        </div>

        <div id="workspace">
            <div id="canvas"></div>
            
            <div class="panel">
                <h3 style="margin:0; color:#00ff88; font-size:16px;">FREE ASSETS</h3>
                <div class="asset-grid">
                    <div class="asset-card" onclick="setHero('https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png')">
                        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/25.png" class="asset-img">
                        <div
