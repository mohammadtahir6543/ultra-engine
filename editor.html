<button class="btn-add" style="background:#ffcc00; color:#000;" onclick="togglePlay()">▶ PLAY GAME</button>

<div id="play-window" style="display:none; position:fixed; bottom:20px; right:20px; width:300px; height:200px; background:#000; border:2px solid #ffcc00; z-index:1000; border-radius:10px;">
    <div style="background:#ffcc00; color:#000; padding:5px; font-size:12px; font-weight:bold;">PREVIEW MODE</div>
    <div id="player-box" style="width:30px; height:30px; background:#00ff88; position:absolute; bottom:10px; left:10px;"></div>
</div>

<script>
    // Play Button Logic
    function togglePlay() {
        const win = document.getElementById('play-window');
        const player = document.getElementById('player-box');
        if(win.style.display === 'none') {
            win.style.display = 'block';
            alert("Game Logic Executing from Cloud Nodes...");
        } else {
            win.style.display = 'none';
        }
    }
</script>
