<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine | All-In-One Fixed</title>
    <style>
        body { background: #000; color: #00ff88; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 1. INTRO SCREEN */
        #intro { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: 1s; }
        .ultra-text { font-size: 80px; font-weight: bold; letter-spacing: 20px; animation: glow 2s infinite alternate; }

        /* 2. START SCREEN */
        #start-screen { position: fixed; inset: 0; background: #050505; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; cursor: pointer; }
        .blink { font-size: 20px; color: #00ff88; animation: blink 1.5s infinite; margin-top: 20px; }

        /* 3. MAIN EDITOR UI */
        #editor-ui { display: none; flex-direction: column; height: 100vh; }
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 10px; z-index: 1000; }
        #workspace { display: flex; flex: 1; position: relative; }
        #canvas { flex: 1; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; position: relative; overflow: hidden; z-index: 10; }
        #side-panel { width: 250px; background: #0a0a0a; border-left: 2px solid #222; padding: 20px; z-index: 100; }

        /* NODES */
        .node { width: 140px; background: #1a1a1a; border: 2px solid #00ff88; position: absolute; border-radius: 8px; cursor: move; z-index: 500; }
        .node-header { background: #00ff88; color: #000; padding: 5px; font-weight: bold; text-align: center; font-size: 11px; pointer-events: none; }

        /* PREVIEW */
        #play-preview { position: fixed; bottom: 20px; right: 270px; width: 250px; height: 150px; background: #000; border: 2px solid #ffcc00; display: none; z-index: 1000; border-radius: 10px; overflow: hidden; }
        #player { width: 25px; height: 25px; background: #00ff88; position: absolute; bottom: 20px; left: 10px; box-shadow: 0 0 10px #00ff88; }

        .btn { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 8px; width: 90%; margin-top: 10px; }

        @keyframes glow { from { text-shadow: 0 0 10px #00ff88; opacity: 0.5; } to { text-shadow: 0 0 40px #00ff88; opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="intro"><div class="ultra-text">ULTRA</div></div>

    <div id="start-screen" onclick="launchEditor()">
        <h1 style="font-size: 50px; margin:0;">ULTRA ENGINE</h1>
        <div class="blink">CLICK TO START</div>
    </div>

    <div id="editor-ui">
        <div id="nav">
            <strong>🌀 EDITOR</strong>
            <button class="btn" onclick="spawnNode('Move')">+ Move Node</button>
            <button class="btn" style="background:#ffcc00; color:#000;" onclick="togglePlay()">▶ PLAY</button>
            <button class="btn" style="margin-left:auto; background:#00ff88; color:#000;" onclick="alert('Synced!')">Save</button>
        </div>
        <div id="workspace">
            <div id="canvas"></div>
            <div id="side-panel">
                <h3 style="margin:0;">Settings</h3>
                <p id="node-label" style="font-size:12px; color:#555;">Select node</p>
                <label>Speed:</label>
                <input type="number" id="val-input" value="10" oninput="updateVal()">
            </div>
        </div>
    </div>

    <div id="play-preview">
        <div style="background:#ffcc00; color:#000; font-size:10px; padding:2px 5px; font-weight:bold;">LIVE PREVIEW</div>
        <div id="player"></div>
    </div>

    <script>
        let selectedNode = null;
        let isPlaying = false;
        let playerPos = 10;
        let gameLoop = null;

        // 1. Intro Animation
        setTimeout(() => {
            const intro = document.getElementById('intro');
            intro.style.opacity = '0';
            setTimeout(() => {
                intro.style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
            }, 1000);
        }, 2500);

        // 2. Launch Editor
        function launchEditor() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('editor-ui').style.display = 'flex';
        }

        // 3. Spawn Node (FIXED)
        function spawnNode(type) {
            const canvas = document.getElementById('canvas');
            const n = document.createElement('div');
            n.className = 'node';
            n.style.left = '50px'; 
            n.style.top = '50px';
            n.dataset.speed = "10";
            
            n.innerHTML = `<div class="node-header">${type.toUpperCase()}</div><div style="height:40px;"></div>`;
            
            n.onclick = (e) => {
                selectedNode = n;
                document.getElementById('node-label').innerText = type + " Selected";
                document.getElementById('val-input').value = n.dataset.speed;
                document.querySelectorAll('.node').forEach(x => x.style.borderColor = '#00ff88');
                n.style.borderColor = '#fff';
                e.stopPropagation();
            };

            canvas.appendChild(n);
            drag(n);
        }

        function updateVal() {
            if(selectedNode) selectedNode.dataset.speed = document.getElementById('val-input').value;
        }

            const preview = document.getElementById('play-preview');
            const player = document.getElementById('player');
            isPlaying = !isPlaying;
            preview.style.display = isPlaying ? 'block' : 'none';

                    playerPos += s;
                    if(playerPos > 220) playerPos = 0;
                    player.style.left = playerPos + "px";
                }, 30);
