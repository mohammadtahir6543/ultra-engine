<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine Pro | Functional Version</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 10px; z-index: 1000; }
        .btn { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #00ff88; color: #000; }
        #workspace { display: flex; flex: 1; position: relative; }
        #canvas { flex: 1; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; position: relative; overflow: hidden; }
        #side-panel { width: 250px; background: #0a0a0a; border-left: 2px solid #222; padding: 20px; z-index: 100; }
        #play-preview { position: fixed; bottom: 20px; right: 270px; width: 250px; height: 150px; background: #000; border: 2px solid #ffcc00; display: none; z-index: 500; border-radius: 10px; overflow: hidden; }
        .node { width: 140px; background: #1a1a1a; border: 2px solid #00ff88; position: absolute; border-radius: 8px; z-index: 10; cursor: move; }
        .node-header { background: #00ff88; color: #000; padding: 5px; font-weight: bold; text-align: center; font-size: 11px; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 8px; width: 90%; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="nav">
        <strong>🌀 ULTRA PRO</strong>
        <button class="btn" onclick="addNode('Move')">+ Move Node</button>
        <button class="btn" style="background:#ffcc00; color:#000;" onclick="togglePlay()">▶ PLAY</button>
        <button class="btn" style="margin-left:auto; background:#00ff88; color:#000;" onclick="cloudSave()">☁️ CLOUD SAVE</button>
    </div>

    <div id="workspace">
        <div id="canvas"></div>
        <div id="side-panel">
            <h3 style="margin:0;">Settings</h3>
            <p id="node-label" style="font-size:12px; color:#555;">Select node</p>
            <label>Speed:</label>
            <input type="number" id="val-input" value="10" oninput="updateVal()">
        </div>
    </div>

    <div id="play-preview">
        <div style="background:#ffcc00; color:#000; font-size:10px; padding:2px 5px; font-weight:bold;">LIVE PREVIEW</div>
        <div id="player" style="width:20px; height:20px; background:#00ff88; position:absolute; bottom:10px; left:10px;"></div>
    </div>

        let isPlaying = false;
        let playerX = 10;
