<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine | Core Logic</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 10px; z-index: 100; }
        
        #workspace { display: flex; flex: 1; position: relative; }
        #canvas { flex: 1; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; position: relative; }
        
        /* Properties Panel (Right Side) */
        #side-panel { width: 250px; background: #111; border-left: 2px solid #222; padding: 20px; display: flex; flex-direction: column; z-index: 50; }
        
        /* Nodes & Lines */
        #svg-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .line { stroke: #00ff88; stroke-width: 3; fill: none; filter: drop-shadow(0 0 5px #00ff88); }
        .node { width: 140px; background: #1a1a1a; border: 2px solid #00ff88; position: absolute; border-radius: 8px; cursor: pointer; }
        .node-header { background: #00ff88; color: #000; padding: 5px; font-weight: bold; text-align: center; font-size: 12px; }
        .port { width: 12px; height: 12px; background: #00ff88; border-radius: 50%; position: absolute; border: 2px solid #000; }
        .port-in { left: -7px; top: 35px; }
        .port-out { right: -7px; top: 35px; cursor: crosshair; }

        input { background: #222; border: 1px solid #00ff88; color: white; padding: 8px; width: 90%; margin-top: 10px; border-radius: 4px; }
        .btn { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 12px; cursor: pointer; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="nav">
    <strong>🌀 ULTRA EDITOR</strong>
    <button class="btn" onclick="createNode('Start')">+ Start</button>
    <button class="btn" onclick="createNode('Move')">+ Move</button>
    <button class="btn" style="background:#00ff88; color:#000;" onclick="saveLogic()">Compile & Save</button>
</div>

<div id="workspace">
    <div id="canvas">
        <svg id="svg-canvas"></svg>
    </div>

    <div id="side-panel">
        <h3 style="margin-top:0;">Properties</h3>
        <p id="selected-node-text" style="color:#888;">No node selected</p>
        <label>Set Value (Speed/Time):</label>
        <input type="number" id="node-value" value="0" oninput="updateNodeData()">
        <p style="font-size:12px; color:#444; margin-top:auto;">Cloud Status: Connected</p>
    </div>
</div>

<script>
    let selectedNode = null;
    let connections = [];

    function createNode(name) {
        const n = document.createElement('div');
        n.className = 'node';
        n.style.left = '50px'; n.style.top = '50px';
        n.dataset.value = "0"; // Default speed/value
        n.innerHTML = `
            <div class="node-header">${name}</div>
            <div style="height:50px;">
                <div class="port port-in"></div>
                <div class="port port-out" onmousedown="alert('Linking started... (Next step will fix lines)')"></div>
            </div>
        `;
        
        n.onclick = () => {
            selectedNode = n;
            document.getElementById('selected-node-text').innerText = "Editing: " + name;
            document.getElementById('node-value').value = n.dataset.value;
        };

        document.getElementById('canvas').appendChild(n);
        makeDraggable(n);
    }

    function updateNodeData() {
        if(selectedNode) {
            selectedNode.dataset.value = document.getElementById('node-value').value;
        }
    }

    function makeDraggable(el) {
        let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
        el.onmousedown = (e) => {
            if(e.target.classList.contains('port')) return;
            p3 = e.clientX; p4 = e.clientY;
            document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
            document.onmousemove = (e) => {
                p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                p3 = e.clientX; p4 = e.clientY;
                el.style.top = (el.offsetTop - p2) + "px";
                el.style.left = (el.offsetLeft - p1) + "px";
            };
        }
    }

    function saveLogic() {
        alert("Logic Compiled! Values and positions saved to your Email Cloud.");
    }
</script>
</body>
</html>
