<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine | Realistic Combat</title>
    <style>
        :root { --neon: #00ff88; --cpp: #0088ff; }
        body { background: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid var(--neon); gap: 15px; }
        #workspace { display: flex; height: calc(100vh - 60px); }
        #canvas { flex: 1; background: #080808; position: relative; overflow: hidden; }

        /* Mega Store */
        #store { width: 320px; background: #0a0a0a; border-left: 2px solid #222; overflow-y: auto; padding: 15px; }
        .category { color: var(--neon); font-size: 12px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
        .asset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .asset-card { background: #151515; border: 1px solid #333; padding: 5px; border-radius: 6px; cursor: pointer; text-align: center; }
        .asset-card:hover { border-color: var(--neon); transform: scale(1.02); }
        .asset-img { width: 100%; height: 70px; object-fit: cover; border-radius: 4px; }

        /* REALISTIC PLAY WINDOW */
        #play-preview { position: fixed; inset: 0; background: #000; display: none; z-index: 10000; }
        #game-map { width: 100%; height: 100%; background-size: cover; background-position: center; position: relative; }
        #player { width: 80px; height: 80px; position: absolute; bottom: 50%; left: 50%; background-size: contain; background-repeat: no-repeat; z-index: 50; transition: transform 0.1s; }
        
        .btn { background: #222; color: var(--neon); border: 1px solid var(--neon); padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: red; color: white; padding: 10px; border: none; cursor: pointer; z-index: 10001; }
    </style>
</head>
<body>

    <div id="nav">
        <strong>🌀 ULTRA REALITY</strong>
        <button class="btn" onclick="addNode('Realistic Physics')">+ Physics</button>
        <button class="btn" style="border-color:var(--cpp); color:var(--cpp);" onclick="addNode('C++ Gun Logic')">+ C++ Script</button>
        <button class="btn" style="background:var(--neon); color:black;" onclick="toggleLaunch()">▶ LAUNCH GAME</button>
    </div>

    <div id="workspace">
        <div id="canvas"></div>
        
        <div id="store">
            <h3 style="margin:0;">ASSET VAULT</h3>
            
            <div class="category">Realistic World (4K)</div>
            <div class="asset-grid">
                <div class="asset-card" onclick="setMap('https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=1000')">
                    <img src="https://images.unsplash.com/photo-1449824913935-59a10b8d2000?q=80&w=1000" class="asset-img">
                    <span>City Highway</span>
                </div>
                <div class="asset-card" onclick="setMap('https://images.unsplash.com/photo-1531265726475-52ad60219627?q=80&w=1000')">
                    <img src="https://images.unsplash.com/photo-1531265726475-52ad60219627?q=80&w=1000" class="asset-img">
                    <span>Airport Hub</span>
                </div>
            </div>

            <div class="category">Vehicles & Heavy</div>
            <div class="asset-grid">
                <div class="asset-card" onclick="setHero('https://cdn-icons-png.flaticon.com/512/744/744465.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/744/744465.png" class="asset-img">
                    <span>GT Sports Car</span>
                </div>
                <div class="asset-card" onclick="setHero('https://cdn-icons-png.flaticon.com/512/619/619104.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/619/619104.png" class="asset-img">
                    <span>Private Jet</span>
                </div>
            </div>

            <div class="category">Realistic Hero</div>
            <div class="asset-grid">
                <div class="asset-card" onclick="setHero('https://cdn-icons-png.flaticon.com/512/3501/3501047.png')">
                    <img src="https://cdn-icons-png.flaticon.com/512/3501/3501047.png" class="asset-img">
                    <span>Soldier</span>
                </div>
            </div>
        </div>
    </div>

    <div id="play-preview">
        <button class="close-btn" onclick="toggleLaunch()">EXIT GAME</button>
        <div id="game-map">
            <div id="player"></div>
        </div>
    </div>

    <script>
        let isGameRunning = false;
        let pX = 50, pY = 50;

        function setMap(url) {
            document.getElementById('game-map').style.backgroundImage = `url(${url})`;
            alert("Realistic Map Synced!");
        }

        function setHero(url) {
            document.getElementById('player').style.backgroundImage = `url(${url})`;
            alert("Asset Assigned to Player!");
        }

        function toggleLaunch() {
            const screen = document.getElementById('play-preview');
            isGameRunning = !isGameRunning;
            screen.style.display = isGameRunning ? 'block' : 'none';
            if(isGameRunning) alert("CONTROLS: Use W, A, S, D to Move");
        }

        // C++ style Movement Logic
        window.addEventListener('keydown', (e) => {
            if(!isGameRunning) return;
            const p = document.getElementById('player');
            let speed = 2;
            if(e.key == 'w') pY -= speed;
            if(e.key == 's') pY += speed;
            if(e.key == 'a') { pX -= speed; p.style.transform = "scaleX(-1)"; }
            if(e.key == 'd') { pX += speed; p.style.transform = "scaleX(1)"; }
            
            p.style.left = pX + "%";
            p.style.top = pY + "%";
        });

        function addNode(txt) {
            const n = document.createElement('div');
            n.style = "width:150px; background:#111; border:2px solid var(--neon); position:absolute; left:100px; top:100px; padding:10px; border-radius:8px; cursor:move; font-size:12px; z-index:1000;";
            n.innerHTML = `<strong>${txt}</strong><br><span style="color:#666">Status: Active</span>`;
            document.getElementById('canvas').appendChild(n);
            
            // Drag logic
            n.onmousedown = (e) => {
                document.onmousemove = (ev) => {
                    n.style.left = ev.clientX - 75 + 'px';
                    n.style.top = ev.clientY - 30 + 'px';
                };
                document.onmouseup = () => document.onmousemove = null;
            };
        }
    </script>
</body>
</html>
