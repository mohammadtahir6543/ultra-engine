<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Engine | Fixed All-In-One</title>
    <style>
        body { background: #000; color: #00ff88; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        
        /* 1. INTRO SCREEN */
        #intro { position: fixed; inset: 0; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; transition: 1s; }
        .ultra-text { font-size: 80px; font-weight: bold; letter-spacing: 20px; animation: glow 2s infinite alternate; }

        /* 2. START SCREEN */
        #start-screen { position: fixed; inset: 0; background: #050505; display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; cursor: pointer; }
        .blink { font-size: 20px; color: #00ff88; animation: blink 1.5s infinite; margin-top: 20px; }

        /* 3. MAIN EDITOR UI */
        #editor-ui { display: none; flex-direction: column; height: 100vh; }
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 10px; }
        #workspace { display: flex; flex: 1; position: relative; }
        #canvas { flex: 1; background: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; position: relative; overflow: hidden; }
        #side-panel { width: 250px; background: #0a0a0a; border-left: 2px solid #222; padding: 20px; }

        /* NODES */
        .node { width: 150px; background: #1a1a1a; border: 2px solid #00ff88; position: absolute; border-radius: 8px; cursor: move; z-index: 100; }
        .node-header { background: #00ff88; color: #000; padding: 6px; font-weight: bold; text-align: center; font-size: 12px; border-radius: 6px 6px 0 0; }
        .port { width: 12px; height: 12px; background: #00ff88; border: 2px solid #000; border-radius: 50%; position: absolute; }
        .port-in { left: -8px; top: 40px; }
        .port-out { right: -8px; top: 40px; }

        /* BUTTONS & INPUTS */
        .btn { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn:hover { background: #00ff88; color: #000; }
        input { background: #111; border: 1px solid #333; color: #fff; padding: 8px; width: 90%; margin-top: 10px; }

        @keyframes glow { from { text-shadow: 0 0 10px #00ff88; opacity: 0.5; } to { text-shadow: 0 0 40px #00ff88; opacity: 1; } }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="intro"><div class="ultra-text">ULTRA</div></div>

    <div id="start-screen" onclick="launchEditor()">
        <h1 style="font-size: 50px; margin:0;">ULTRA ENGINE</h1>
        <div class="blink">CLICK TO START</div>
    </div>

    <div id="editor-ui">
        <div id="nav">
            <strong>🌀 EDITOR</strong>
            <button class="btn" onclick="spawnNode('Start')">+ Start</button>
            <button class="btn" onclick="spawnNode('Move')">+ Move</button>
            <button class="btn" onclick="spawnNode('Jump')">+ Jump</button>
            <button class="btn" style="margin-left:auto; background:#00ff88; color:#000;" onclick="alert('Saving to Cloud...')">Save</button>
        </div>
        <div id="workspace">
            <div id="canvas"></div>
            <div id="side-panel">
                <h3 style="margin:0;">Properties</h3>
                <p id="sel-node" style="color:#666; font-size:13px;">Select a node</p>
                <label>Speed:</label>
                <input type="number" id="speed-input" value="10" oninput="updateSpeed()">
            </div>
        </div>
    </div>

    <script>
        let selectedNode = null;

        // 1. Intro Logic
        setTimeout(() => {
            document.getElementById('intro').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('intro').style.display = 'none';
                document.getElementById('start-screen').style.display = 'flex';
            }, 1000);
        }, 3000);

        // 2. Launch Editor
        function launchEditor() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('editor-ui').style.display = 'flex';
        }

        // 3. Spawn Node Logic (FIXED)
        function spawnNode(type) {
            const canvas = document.getElementById('canvas');
            const node = document.createElement('div');
            node.className = 'node';
            // Screen ke beech mein spawn hoga
            node.style.left = '50px';
            node.style.top = '50px';
            node.dataset.speed = "10";

            node.innerHTML = `
                <div class="node-header">${type.toUpperCase()}</div>
                <div style="height:60px; position:relative;">
                    <div class="port port-in"></div>
                    <div class="port port-out"></div>
                </div>
            `;

            node.onclick = (e) => {
                selectedNode = node;
                document.getElementById('sel-node').innerText = type + " Node Selected";
                document.getElementById('speed-input').value = node.dataset.speed;
                e.stopPropagation();
            };

            canvas.appendChild(node);
            makeDraggable(node);
        }

        function updateSpeed() {
            if(selectedNode) selectedNode.dataset.speed = document.getElementById('speed-input').value;
        }

        // 4. Drag Logic (FIXED)
        function makeDraggable(el) {
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            el.onmousedown = (e) => {
                if(e.target.classList.contains('port')) return;
                p3 = e.clientX; p4 = e.clientY;
                document.onmouseup = () => { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = (e) => {
                    p1 = p3 - e.clientX; p2 = p4 - e.clientY;
                    p3 = e.clientX; p4 = e.clientY;
                    el.style.top = (el.offsetTop - p2) + "px";
                    el.style.left = (el.offsetLeft - p1) + "px";
                };
            };
        }
    </script>
</body>
</html>
