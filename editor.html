<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Ultra Editor Pro | No-Code</title>
    <style>
        body { background: #050505; color: #00ff88; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        
        /* Top Navigation */
        #nav { height: 60px; background: #111; display: flex; align-items: center; padding: 0 20px; border-bottom: 2px solid #222; gap: 15px; z-index: 10; }
        
        /* Main Workspace */
        #main-container { display: flex; flex: 1; }
        
        /* The Visual Area */
        #canvas { 
            flex: 1; background: radial-gradient(#222 1px, transparent 1px); 
            background-size: 30px 30px; position: relative; overflow: hidden;
        }

        /* Side Panel (Properties) */
        #side-panel { width: 250px; background: #111; border-left: 2px solid #222; padding: 20px; display: flex; flex-direction: column; }

        .node { 
            width: 140px; background: #1a1a1a; border: 1.5px solid #00ff88; 
            position: absolute; cursor: move; border-radius: 8px; font-size: 13px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4); overflow: hidden;
        }
        .node-title { background: #00ff88; color: #000; padding: 5px; font-weight: bold; text-align: center; }
        .node-content { padding: 10px; text-align: center; color: #fff; }

        .btn-add { background: #222; color: #00ff88; border: 1px solid #00ff88; padding: 8px 15px; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .btn-add:hover { background: #00ff88; color: #000; }
        
        .prop-input { background: #222; border: 1px solid #333; color: #00ff88; padding: 8px; margin-top: 10px; width: 90%; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="nav">
        <strong>🌀 ULTRA EDITOR</strong>
        <button class="btn-add" onclick="createNode('Player', '#00ff88')">+ Player</button>
        <button class="btn-add" onclick="createNode('Logic', '#ff9900')">+ Logic</button>
        <button class="btn-add" onclick="createNode('Event', '#ff4444')">+ Event</button>
        <button class="btn-add" style="margin-left:auto; background:#00ff88; color:#000;" onclick="saveProject()">Save to Cloud</button>
    </div>
    
    <div id="main-container">
        <div id="canvas"></div>
        
        <div id="side-panel">
            <h3>Properties</h3>
            <label>Node Name:</label>
            <input type="text" class="prop-input" id="prop-name" placeholder="Selected Node">
            <label style="margin-top:15px; display:block;">Variable Value:</label>
            <input type="number" class="prop-input" id="prop-val" value="0">
            <p style="font-size:11px; color:#555; margin-top:20px;">🛡️ Eye-Comfort: 85%<br>☁️ Storage: Email Vault</p>
        </div>
    </div>

    <script>
        function createNode(type, color) {
            const canvas = document.getElementById('canvas');
            const n = document.createElement('div');
            n.className = 'node';
            n.style.borderColor = color;
            n.innerHTML = `<div class="node-title" style="background:${color}">${type}</div><div class="node-content">ID: ${Math.floor(Math.random()*99)}</div>`;
            n.style.left = '50px'; n.style.top = '50px';
            canvas.appendChild(n);
            dragElement(n);
            
            // Click karne par properties dikhaye
            n.onclick = () => { document.getElementById('prop-name').value = type; };
        }

        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            elmnt.onmousedown = dragMouseDown;
            function dragMouseDown(e) { e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY; document.onmouseup = closeDragElement; document.onmousemove = elementDrag; }
            function elementDrag(e) { e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY; pos3 = e.clientX; pos4 = e.clientY; elmnt.style.top = (elmnt.offsetTop - pos2) + "px"; elmnt.style.left = (elmnt.offsetLeft - pos1) + "px"; }
            function closeDragElement() { document.onmouseup = null; document.onmousemove = null; }
        }

        function saveProject() {
            alert("Project structure encrypted and sent to your Email Cloud. Local Storage: 0 bytes used.");
        }
    </script>
</body>
</html>
